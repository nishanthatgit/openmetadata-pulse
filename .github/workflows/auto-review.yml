name: Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Assign reviewer based on PR author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewerMap = {
              'Igrock007': 'nishanthatgit',
              'nishanthatgit': 'Chellammal-K',
              'Chellammal-K': 'pknaveenece',
              'pknaveenece': 'Igrock007'
            };

            const author = context.payload.pull_request.user.login;
            const reviewer = reviewerMap[author];

            if (!reviewer) {
              console.log(`No reviewer mapping for author: ${author}`);
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: [reviewer]
              });
              console.log(`✅ Assigned @${reviewer} to review PR #${context.payload.pull_request.number} by @${author}`);
            } catch (error) {
              console.error(`Failed to assign reviewer: ${error.message}`);
            }
